<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Симулятор Домофона</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; touch-action: none; font-family: sans-serif; }
        #ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 350px; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 15px; border: 1px solid #333;
            color: #ccc; text-align: center; pointer-events: none; z-index: 5;
            user-select: none;
        }
        
        /* ИСПРАВЛЕНИЕ ЗДЕСЬ: Добавлен flex-wrap и width: 100% */
        #brand-selector {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; z-index: 10;
            width: 100%; padding: 0 10px; box-sizing: border-box;
        }
        
        .brand-btn {
            background: #222; color: #fff; border: 1px solid #555;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .brand-btn:hover { background: #444; }
        .brand-btn.active { background: #0066cc; border-color: #0099ff; }
        
        #loading {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #111; display:flex; justify-content:center; align-items:center;
            color: white; font-family: monospace; font-size: 18px; z-index: 20; transition: opacity 0.5s;
        }

        /* ИСПРАВЛЕНИЕ ЗДЕСЬ: Убрано position: absolute и right: 15px */
        #settings-btn {
            background: #333; color: white; border: 1px solid #666;
            padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #settings-btn:hover { background: #555; }
        
        #settings-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); border: 1px solid #555; border-radius: 12px;
            padding: 20px; z-index: 15; color: #fff; width: 300px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #settings-modal h3 { margin-top: 0; }
        #settings-modal input {
            width: 90%; padding: 8px; margin-bottom: 10px; border-radius: 5px;
            border: 1px solid #444; background: #222; color: #fff;
        }
        .action-btn {
            background: #0066cc; color: white; border: none; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; margin-top: 5px; font-weight: bold;
        }
        .action-btn:hover { background: #0088ff; }
        #custom-list { margin-top: 15px; font-size: 13px; color: #aaa; text-align: left; max-height: 100px; overflow-y: auto;}
    </style>
</head>
<body>

<div id="loading">Загрузка симуляции...</div>

<div id="brand-selector">
    <button class="brand-btn active" onclick="switchBrand('eltis')">ELTIS</button>
    <button class="brand-btn" onclick="switchBrand('vizit')">VIZIT</button>
    <button class="brand-btn" onclick="switchBrand('cyfral')">CYFRAL</button>
    <button id="settings-btn" onclick="toggleSettings()">⚙️ Свой звук</button>
</div>

<div id="settings-modal">
    <h3>Добавить звук</h3>
    <input type="number" id="custom-code" placeholder="Введите код (например: 999)">
    <input type="file" id="custom-audio" accept="audio/*">
    <button class="action-btn" onclick="addCustomSound()">Сохранить код</button>
    <div id="custom-list">Пользовательских кодов пока нет.</div>
    <button class="action-btn" style="background:#555; margin-top: 15px;" onclick="toggleSettings()">Закрыть</button>
</div>

<div id="ui">
    <div id="brand-name" style="font-weight: bold; color: #fff; margin-bottom: 5px;">ELTIS DP400 Series</div>
    <div style="font-size: 12px;">Номера: 50, 72, 123, 1254, 3768, 1256, 3457, 2448<br>Кнопка "В" — вызов, "С" — сброс</div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/** * ПОЛЬЗОВАТЕЛЬСКИЕ ЗВУКИ (НОВОЕ) */
const customSounds = {}; 
const customCodes = [];
let activeCustomAudio = null;

function toggleSettings() {
    const modal = document.getElementById('settings-modal');
    modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
}

function addCustomSound() {
    const codeInput = document.getElementById('custom-code').value.trim();
    const fileInput = document.getElementById('custom-audio').files[0];

    if (!codeInput || !fileInput) {
        alert("Пожалуйста, введите код и выберите аудиофайл!");
        return;
    }

    const audioURL = URL.createObjectURL(fileInput);
    const audioObj = new Audio(audioURL);
    
    customSounds[codeInput] = audioObj;
    if (!customCodes.includes(codeInput)) customCodes.push(codeInput);

    const list = document.getElementById('custom-list');
    list.innerHTML = '<b>Ваши коды:</b><br>' + customCodes.map(c => `🔑 Код ${c}`).join('<br>');
    
    document.getElementById('custom-code').value = '';
    document.getElementById('custom-audio').value = '';
    alert(`Звук успешно привязан к коду: ${codeInput}`);
}

function playCustomAudio(code) {
    if (activeCustomAudio) {
        activeCustomAudio.pause();
        activeCustomAudio.currentTime = 0;
    }
    activeCustomAudio = customSounds[code];
    activeCustomAudio.play();
    
    activeCustomAudio.onended = () => {
        if (isCalling) stopCall();
    };
}

/** * АУДИО И СИНТЕЗ ГОЛОСА */
let audioCtx = null;
let callInterval = null;
let ringTimeout = null;
let voicesLoaded = false;
let currentBrand = 'eltis';
let randomCallCount = 0; 

function getAudioContext() {
    try {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    } catch (e) {
        console.warn("Аудио не поддерживается", e);
        return null;
    }
}

if ('speechSynthesis' in window) {
    const loadVoices = () => { window.speechSynthesis.getVoices(); voicesLoaded = true; };
    loadVoices();
    if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = loadVoices;
}

function playKeySound(brand = 'eltis') {
    const ctx = getAudioContext();
    if (!ctx) return;
    
    let freq = 1100;
    if (brand === 'vizit') freq = 1400;
    else if (brand === 'cyfral') freq = 900;

    try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
}

function playCallSound(brand = 'eltis') {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;

    try {
        if (brand === 'eltis') {
            [1350, 950].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(freq, now + i * 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.05 + i * 0.1);
                gain.gain.linearRampToValueAtTime(0, now + 0.2 + i * 0.1);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now); osc.stop(now + 0.4);
            });
        } else if (brand === 'vizit') {
            [1200, 1200].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, now + i * 0.15);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.03, now + 0.05 + i * 0.15);
                gain.gain.linearRampToValueAtTime(0, now + 0.1 + i * 0.15);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now); osc.stop(now + 0.3);
            });
        } else if (brand === 'cyfral') {
            [800, 1000, 800].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(freq, now + i * 0.2);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.05 + i * 0.2);
                gain.gain.linearRampToValueAtTime(0, now + 0.15 + i * 0.2);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now); osc.stop(now + 0.5);
            });
        }
    } catch(e) {}
}

function playVoiceResponse(code) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();

    let text = "";
    let pitch = 1, rate = 1, voiceHint = "";

    if (code === "50") { text = "Кто там? А мамы нет дома!"; pitch = 1.8; rate = 1.05; voiceHint = "female"; }
    else if (code === "72") { text = "Слушаю. Вы к кому?"; pitch = 1.2; rate = 0.95; voiceHint = "female"; }
    else if (code === "123") { text = "Кому есть до меня дела в три часа ночи?"; pitch = 0.4; rate = 0.85; voiceHint = "male"; }
    else if (code === "1254") { text = "у меня чешется писюн"; pitch = 1.4; rate = 1.0; voiceHint = "male"; }
    else if (code === "3768") { text = "пиписька большая у меня выросла"; pitch = 0.6; rate = 0.9; voiceHint = "male"; }
    else if (code === "1256") { text = "Сас сегодня украл Ёрика"; pitch = 1.0; rate = 1.0; voiceHint = "male"; }
    else if (code === "3457") { text = "Веталь, сколько вы выкакивайте за раз"; pitch = 0.8; rate = 0.9; voiceHint = "male"; }
    else if (code === "2448") { text = "мышка сосиска мышка сосиска"; pitch = 2.0; rate = 1.3; voiceHint = "female"; }

    speakText(text, pitch, rate, voiceHint, 1.0);
}

function playAngryResponse() {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    
    randomCallCount++;
    if (randomCallCount % 5 === 0) {
        speakText("да ты уже заебал звонить!!!", 1.5, 1.2, "male", 1.0);
    } else {
        speakText("пошел нахуй", 0.3, 0.9, "male", 1.0);
    }
}

function speakText(text, pitch, rate, voiceHint, volume = 1.0) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ru-RU';
    utterance.pitch = pitch;
    utterance.rate = rate;
    utterance.volume = volume;
    
    const voices = window.speechSynthesis.getVoices();
    const ruVoices = voices.filter(v => v.lang.includes('ru'));
    if (ruVoices.length > 0) {
        let selectedVoice = ruVoices[0];
        const matched = ruVoices.find(v => v.name.toLowerCase().includes(voiceHint) || v.name.toLowerCase().includes(voiceHint === 'male' ? 'муж' : 'жен'));
        if (matched) selectedVoice = matched;
        utterance.voice = selectedVoice;
    }
    window.speechSynthesis.speak(utterance);
}

/** * ГРАФИКА И МОДЕЛЬ */
let scene, camera, renderer, controls, raycaster, mouse;
let eltisGroup, vizitGroup, cyfralGroup; 
let buttons = [], displayCanvas, displayTex, isCalling = false;
let currentInput = "";
let ledColor = "#ff1111"; 

function createBumpTexture() {
    const size = 512;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(size, size);
    for (let i = 0; i < imgData.data.length; i += 4) {
        const val = Math.random() * 255;
        imgData.data[i] = val; imgData.data[i+1] = val; imgData.data[i+2] = val; imgData.data[i+3] = 255;   
    }
    ctx.putImageData(imgData, 0, 0);
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(3, 5); 
    return tex;
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    
    camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 4.5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan = false; controls.minDistance = 2.5; controls.maxDistance = 6; controls.maxPolarAngle = Math.PI / 1.5;

    const ambient = new THREE.AmbientLight(0xffffff, 0.3); scene.add(ambient);
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5); hemiLight.position.set(0, 10, 0); scene.add(hemiLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); dirLight.position.set(2, 5, 4); scene.add(dirLight);

    displayCanvas = document.createElement('canvas');
    displayCanvas.width = 128; displayCanvas.height = 64;
    displayTex = new THREE.CanvasTexture(displayCanvas);

    createIntercomModels();
    showModel('eltis'); 
    
    setupEvents();
    
    setTimeout(() => document.getElementById('loading').style.opacity = 0, 500);
    setTimeout(() => document.getElementById('loading').remove(), 1000);
    
    animate();
}

function buildStandardPanel(group, panelMat, logoText, logoFont) {
    const panelGeo = new THREE.BoxGeometry(1.6, 2.8, 0.15);
    const panel = new THREE.Mesh(panelGeo, panelMat);
    group.add(panel);

    const dispBox = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.35), new THREE.MeshBasicMaterial({ color: 0x110000 }));
    dispBox.position.set(0, 0.9, 0.076); group.add(dispBox);
    const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.25), new THREE.MeshBasicMaterial({ map: displayTex, transparent: true }));
    screen.position.set(0, 0.9, 0.08); group.add(screen);
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.35), new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.3, metalness: 1, roughness: 0 }));
    glass.position.set(0, 0.9, 0.085); group.add(glass);

    [[-0.7, 1.3], [0.7, 1.3], [-0.7, -1.3], [0.7, -1.3]].forEach(pos => {
        const screw = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.02, 16), new THREE.MeshStandardMaterial({color:0x555, metalness:0.9, roughness:0.2}));
        screw.rotation.x = Math.PI/2; screw.position.set(pos[0], pos[1], 0.08); group.add(screw);
    });

    for(let y=0; y<4; y++) {
        for(let x=0; x<8; x++) {
            const hole = new THREE.Mesh(new THREE.CircleGeometry(0.02, 8), new THREE.MeshBasicMaterial({ color: 0x050505 }));
            hole.position.set(-0.3 + x*0.08, 0.5 + y*0.06, 0.076); group.add(hole);
        }
    }

    const labels = ["1","2","3","4","5","6","7","8","9","C","0","B"];
    const rimGeo = new THREE.TorusGeometry(0.125, 0.015, 16, 32);
    const rimMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.9, roughness: 0.2 });
    const btnGeo = new THREE.CylinderGeometry(0.11, 0.11, 0.08, 32);
    const btnMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.4, roughness: 0.8 });

    labels.forEach((label, i) => {
        const x = (i % 3) * 0.4 - 0.4;
        const y = -Math.floor(i / 3) * 0.35 + 0.1;
        
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.position.set(x, y, 0.076); group.add(rim);

        const btnWrap = new THREE.Group();
        const b = new THREE.Mesh(btnGeo, btnMat.clone());
        b.rotation.x = Math.PI/2; b.userData = { label: label }; btnWrap.add(b);
        
        const c = document.createElement('canvas'); c.width = 64; c.height = 64; const ctx = c.getContext('2d');
        ctx.fillStyle = "#fff"; ctx.font = "bold 34px Arial"; ctx.textAlign = "center"; ctx.fillText(label, 32, 45);
        const t = new THREE.CanvasTexture(c);
        const lp = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 0.14), new THREE.MeshBasicMaterial({map:t, transparent:true}));
        lp.position.z = 0.041; btnWrap.add(lp);
        btnWrap.position.set(x, y, 0.05); group.add(btnWrap);
    });

    const logoCanvas = document.createElement('canvas');
    logoCanvas.width = 128; logoCanvas.height = 40;
    const lCtx = logoCanvas.getContext('2d');
    lCtx.fillStyle = "#d0d0d0"; lCtx.font = logoFont;
    lCtx.shadowColor = "rgba(0,0,0,0.5)"; lCtx.shadowBlur = 2; lCtx.shadowOffsetX = 1; lCtx.shadowOffsetY = 1;
    lCtx.fillText(logoText, 10, 30);
    const logoTex = new THREE.CanvasTexture(logoCanvas);
    const logo = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.15), new THREE.MeshBasicMaterial({map:logoTex, transparent:true}));
    logo.position.set(-0.4, 1.25, 0.076);
    group.add(logo);
}

function createIntercomModels() {
    const bumpMap = createBumpTexture();

    eltisGroup = new THREE.Group();
    const eltisMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.6, roughness: 0.7, bumpMap: bumpMap, bumpScale: 0.006 });
    buildStandardPanel(eltisGroup, eltisMat, "ELTIS", "italic bold 32px serif");
    scene.add(eltisGroup);

    vizitGroup = new THREE.Group();
    const vizitMat = new THREE.MeshStandardMaterial({ color: 0xcd7f32, metalness: 0.7, roughness: 0.5, bumpMap: bumpMap, bumpScale: 0.008 });
    buildStandardPanel(vizitGroup, vizitMat, "VIZIT", "bold 32px sans-serif");
    scene.add(vizitGroup);

    cyfralGroup = new THREE.Group();
    const cyfralMat = new THREE.MeshStandardMaterial({ color: 0x3d1c02, metalness: 0.6, roughness: 0.6, bumpMap: bumpMap, bumpScale: 0.004 });
    buildStandardPanel(cyfralGroup, cyfralMat, "CYFRAL", "bold 28px Arial");
    scene.add(cyfralGroup);
}

function showModel(brand) {
    if (isCalling) stopCall();
    
    eltisGroup.visible = false;
    vizitGroup.visible = false;
    cyfralGroup.visible = false;
    
    document.querySelectorAll('.brand-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`#brand-selector button[onclick="switchBrand('${brand}')"]`).classList.add('active');
    
    const brandNames = {
        'eltis': 'ELTIS DP400 Series',
        'vizit': 'VIZIT BVD-343',
        'cyfral': 'CYFRAL CCD-2094'
    };
    document.getElementById('brand-name').innerText = brandNames[brand];
    
    let activeGroup = null;
    if (brand === 'eltis') { activeGroup = eltisGroup; ledColor = "#ff1111"; }
    else if (brand === 'vizit') { activeGroup = vizitGroup; ledColor = "#00ff33"; }
    else if (brand === 'cyfral') { activeGroup = cyfralGroup; ledColor = "#ff2222"; }
    
    activeGroup.visible = true;
    buttons = activeGroup.children.filter(obj => obj.children && obj.children.some(child => child.userData && child.userData.label))
                                 .map(obj => obj.children.find(child => child.userData && child.userData.label));
                                 
    updateDisplay("READY");
    currentBrand = brand;
}

function switchBrand(brand) {
    if (brand === currentBrand) return;
    showModel(brand);
}

function updateDisplay(text) {
    const ctx = displayCanvas.getContext('2d');
    ctx.clearRect(0,0,128,64);
    ctx.fillStyle = ledColor;
    ctx.font = "bold 40px 'Courier New'";
    ctx.shadowBlur = 12; ctx.shadowColor = ledColor;
    ctx.textAlign = "center";
    ctx.fillText(text, 64, 45);
    displayTex.needsUpdate = true;
}

function handlePress(label) {
    if (isCalling) {
        stopCall();
        return;
    }

    if (label === 'C') {
        currentInput = "";
        playKeySound(currentBrand);
        updateDisplay("____");
    } else if (label === 'B') {
        const instantCodes = ["123", "50", "72", "1254", "3768", "1256", "3457", "2448"];
        
        if (instantCodes.includes(currentInput) || customCodes.includes(currentInput)) {
            isCalling = true;
            updateDisplay("TALK");
            
            if (customCodes.includes(currentInput)) {
                playCustomAudio(currentInput);
            } else {
                playVoiceResponse(currentInput);
                setTimeout(() => { if (isCalling) stopCall(); }, 5000);
            }
        } else if (currentInput.length > 0) {
            startCall();
        } else {
            playKeySound(currentBrand);
        }
    } else {
        if (currentInput.length < 5 && !isNaN(label)) {
            currentInput += label;
            playKeySound(currentBrand);
            updateDisplay(currentInput);
        }
    }
}

function startCall() {
    isCalling = true;
    updateDisplay("CALL");
    playCallSound(currentBrand);
    
    let ringIntervalMs = 1800; 
    if (currentBrand === 'vizit') ringIntervalMs = 1200; 
    else if (currentBrand === 'cyfral') ringIntervalMs = 2000; 

    callInterval = setInterval(() => playCallSound(currentBrand), ringIntervalMs);
    
    ringTimeout = setTimeout(() => {
        clearInterval(callInterval); 
        updateDisplay("TALK");
        playAngryResponse();
        setTimeout(() => { if (isCalling) stopCall(); }, 3000);
    }, 5500);
}

function stopCall() {
    isCalling = false;
    clearInterval(callInterval);
    clearTimeout(ringTimeout); 
    currentInput = "";
    updateDisplay("____");
    if ('speechSynthesis' in window) window.speechSynthesis.cancel(); 
    
    if (activeCustomAudio) {
        activeCustomAudio.pause();
        activeCustomAudio.currentTime = 0;
        activeCustomAudio = null;
    }
}

function setupEvents() {
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    const onAction = (e) => {
        if (e.target.closest('#brand-selector') || e.target.closest('#settings-btn') || e.target.closest('#settings-modal')) return;
        if (e.type === 'touchstart' && e.target.tagName !== 'CANVAS') return; 
        
        let x, y;
        if (e.type === 'touchstart' || e.type === 'touchmove') {
            if (e.touches.length === 0) return;
            x = e.touches[0].clientX; y = e.touches[0].clientY;
        } else {
            x = e.clientX; y = e.clientY;
        }
        
        if (x === undefined || y === undefined) return;

        mouse.x = (x / window.innerWidth) * 2 - 1;
        mouse.y = -(y / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(buttons);
        if (hits.length > 0) {
            const btn = hits[0].object;
            const parentWrap = btn.parent; 
            
            parentWrap.position.z -= 0.015; 
            setTimeout(() => parentWrap.position.z += 0.015, 100);
            
            handlePress(btn.userData.label);
        }
    };

    window.addEventListener('mousedown', onAction);
    window.addEventListener('touchstart', onAction, {passive: true});
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

window.addEventListener('load', init);
</script>
</body>
</html>
