<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pro Flight Simulator WebGL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Consolas', monospace; user-select: none; }

        /* UI ОВЕРЛЕЙ */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* HUD ЛЕВЫЙ */
        .hud-panel {
            position: absolute;
            background: rgba(0, 20, 0, 0.5);
            border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            color: #0f0;
            font-size: 12px;
            text-shadow: 0 0 4px #0f0;
        }
        #hud-left { top: 20px; left: 20px; }
        #hud-right { top: 20px; right: 20px; text-align: right; }

        /* ЦЕНТРАЛЬНЫЙ ПРИЦЕЛ */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 40px; height: 40px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: #0f0;
            transform: translate(-50%, -50%);
        }

        /* АВИАГОРИЗОНТ */
        #horizon-container {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 100px;
            border: 2px solid #0f0;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        #horizon-line {
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 2px; background: #0f0;
            width: 100%;
        }
        #horizon-plane {
            position: absolute;
            top: 50%; left: 50%;
            width: 40px; height: 2px;
            background: #f00;
            transform: translate(-50%, -50%);
        }

        /* ЭКРАН ЗАГРУЗКИ / СМЕРТИ */
        #overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; pointer-events: auto;
            z-index: 999;
        }
        h1 { margin: 0 0 10px 0; font-size: 40px; color: #ff3333; text-transform: uppercase; letter-spacing: 5px; }
        button {
            padding: 15px 40px; font-size: 18px;
            background: transparent; border: 2px solid #0f0; color: #0f0;
            cursor: pointer; transition: 0.3s;
            font-family: inherit; text-transform: uppercase;
        }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }

        .key-hint {
            margin-top: 20px; font-size: 14px; color: #aaa;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="hud-left" class="hud-panel">
            SPD: <span id="val-spd">0</span> KM/H<br>
            ALT: <span id="val-alt">0</span> M<br>
            THR: <span id="val-thr">0</span> %
        </div>
        <div id="hud-right" class="hud-panel">
            POS X: <span id="val-x">0</span><br>
            POS Z: <span id="val-z">0</span><br>
            FPS: <span id="val-fps">60</span>
        </div>
        <div id="crosshair"></div>
        <div id="horizon-container">
            <div id="horizon-line"></div>
            <div id="horizon-plane"></div>
        </div>
    </div>

    <div id="overlay-screen">
        <h1 id="status-text">FLIGHT SIM 2.0</h1>
        <button id="start-btn">ЗАПУСТИТЬ ДВИГАТЕЛИ</button>
        <div class="key-hint">ПК: Мышь = Штурвал | W/S = Тяга<br>Мобильный: Тач-джойстик</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

    <script>
        /**
         * ГЕНЕРАТОР ТЕКСТУР (ПРОЦЕДУРНЫЙ)
         * Создает текстуры "на лету", чтобы не грузить картинки из интернета.
         */
        const TextureGen = {
            createNoiseTexture: function(width, height, color1, color2) {
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');

                // Заливка фона
                ctx.fillStyle = color1;
                ctx.fillRect(0, 0, width, height);

                // Шум
                for(let i=0; i<4000; i++) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    const s = Math.random() * 2;
                    ctx.fillStyle = color2;
                    ctx.globalAlpha = Math.random() * 0.5;
                    ctx.fillRect(x, y, s, s);
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                return texture;
            },
            createMetalTexture: function() {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');

                // Градиент металла
                const grd = ctx.createLinearGradient(0, 0, 256, 256);
                grd.addColorStop(0, "#888");
                grd.addColorStop(0.5, "#eee");
                grd.addColorStop(1, "#888");
                ctx.fillStyle = grd;
                ctx.fillRect(0,0,256,256);

                // Заклепки
                ctx.fillStyle = "#555";
                for(let x=10; x<256; x+=30) {
                    for(let y=10; y<256; y+=30) {
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, 2*Math.PI);
                        ctx.fill();
                    }
                }
                return new THREE.CanvasTexture(canvas);
            }
        };

        // --- ГЛОБАЛЬНЫЕ НАСТРОЙКИ ---
        const GAME = {
            active: false,
            width: window.innerWidth,
            height: window.innerHeight,
            scene: null, camera: null, renderer: null,
            clock: new THREE.Clock(),
            entities: [],
            simplex: new SimplexNoise(),
            input: { x: 0, y: 0, throttle: 0.5 } // x/y = -1 to 1
        };

        // --- КЛАСС САМОЛЕТА ---
        class Airplane {
            constructor() {
                this.mesh = new THREE.Group();
                this.speed = 0;
                this.maxSpeed = 2.5;
                this.rotParams = { x: 0, y: 0, z: 0 }; // Текущие углы
                this.targetRot = { x: 0, y: 0, z: 0 }; // Целевые углы (от мыши)

                this.initModel();
                this.initParticles();
            }

            initModel() {
                // Материалы
                const metalMat = new THREE.MeshStandardMaterial({
                    map: TextureGen.createMetalTexture(),
                    roughness: 0.4, metalness: 0.6
                });
                const glassMat = new THREE.MeshPhongMaterial({ color: 0x00aaff, shininess: 100, transparent: true, opacity: 0.7 });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

                // Корпус (удлиненный)
                const fuselageGeo = new THREE.CylinderGeometry(0.8, 0.5, 6, 12);
                fuselageGeo.rotateX(Math.PI / 2);
                const fuselage = new THREE.Mesh(fuselageGeo, metalMat);
                fuselage.castShadow = true;
                this.mesh.add(fuselage);

                // Кабина
                const cockpitGeo = new THREE.SphereGeometry(0.7, 16, 16);
                cockpitGeo.scale(1, 0.7, 2);
                const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
                cockpit.position.set(0, 0.8, 0.5);
                this.mesh.add(cockpit);

                // Главные крылья
                const wingGeo = new THREE.BoxGeometry(10, 0.1, 2);
                const wing = new THREE.Mesh(wingGeo, metalMat);
                wing.position.set(0, 0, 0.5);
                wing.castShadow = true;
                this.mesh.add(wing);

                // Хвостовое оперение
                const tailWingGeo = new THREE.BoxGeometry(3.5, 0.1, 1.2);
                const tailWing = new THREE.Mesh(tailWingGeo, metalMat);
                tailWing.position.set(0, 0.2, -2.5);
                this.mesh.add(tailWing);

                const tailFinGeo = new THREE.BoxGeometry(0.1, 2, 1.5);
                const tailFin = new THREE.Mesh(tailFinGeo, metalMat);
                tailFin.position.set(0, 1, -2.5);
                this.mesh.add(tailFin);

                // Пропеллер
                const propGeo = new THREE.BoxGeometry(3.5, 0.1, 0.2);
                this.propeller = new THREE.Mesh(propGeo, darkMat);
                this.propeller.position.set(0, 0, 3.1);
                this.mesh.add(this.propeller);

                // Кок (нос)
                const noseGeo = new THREE.ConeGeometry(0.8, 1, 16);
                noseGeo.rotateX(Math.PI/2);
                const nose = new THREE.Mesh(noseGeo, metalMat);
                nose.position.z = 3.1;
                this.mesh.add(nose);

                GAME.scene.add(this.mesh);
                this.mesh.position.y = 100; // Стартовая высота
            }

            initParticles() {
                // Простая система частиц для дыма
                this.particles = [];
                const particleGeo = new THREE.PlaneGeometry(0.5, 0.5);
                const particleMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.4,
                    side: THREE.DoubleSide
                });

                for(let i=0; i<50; i++) {
                    const p = new THREE.Mesh(particleGeo, particleMat);
                    p.visible = false;
                    GAME.scene.add(p);
                    this.particles.push({ mesh: p, life: 0 });
                }
            }

            updateParticles() {
                // Спавн новой частицы
                if(this.speed > 0.5) {
                    const p = this.particles.find(p => p.life <= 0);
                    if(p) {
                        p.life = 50;
                        p.mesh.visible = true;
                        // Позиция спавна (позади самолета)
                        const offset = new THREE.Vector3(0, 0, -3.2).applyQuaternion(this.mesh.quaternion);
                        p.mesh.position.copy(this.mesh.position).add(offset);
                        p.mesh.scale.set(1,1,1);
                        p.mesh.rotation.copy(this.mesh.rotation);
                    }
                }

                // Обновление существующих
                this.particles.forEach(p => {
                    if(p.life > 0) {
                        p.life--;
                        p.mesh.position.y += 0.05; // Дым поднимается
                        const s = 1 + (50 - p.life) * 0.1; // Дым растет
                        p.mesh.scale.set(s,s,s);
                        p.mesh.material.opacity = p.life / 50 * 0.4;
                        p.mesh.lookAt(GAME.camera.position); // Billboard эффект
                    } else {
                        p.mesh.visible = false;
                    }
                });
            }

            update(dt) {
                // 1. Обработка ввода (Физика стабилизации)

                // Целевой крен (Roll) - наклон влево/вправо зависит от позиции мыши по X
                // Ограничиваем угол (например, 60 градусов = 1.0 радиан)
                const maxRoll = 1.0;
                this.targetRot.z = -GAME.input.x * maxRoll;

                // Целевой тангаж (Pitch) - нос вверх/вниз зависит от мыши по Y
                const maxPitch = 0.8;
                this.targetRot.x = GAME.input.y * maxPitch;

                // Интерполяция (Плавное стремление к цели) - решает проблему "вертолета"
                // Самолет всегда пытается вернуться к состоянию, заданному мышью.
                // Если мышь в центре (0,0), самолет выравнивается.
                const lerpFactor = 2.0 * dt; // Скорость реакции
                this.rotParams.x += (this.targetRot.x - this.rotParams.x) * lerpFactor;
                this.rotParams.z += (this.targetRot.z - this.rotParams.z) * lerpFactor;

                // Рыскание (Yaw) - поворот корпуса при крене
                this.rotParams.y -= this.rotParams.z * dt * 0.5;

                // Применяем вращение
                this.mesh.rotation.set(this.rotParams.x, this.rotParams.y, this.rotParams.z);

                // 2. Движение
                // Скорость зависит от Throttle (тяги)
                const targetSpeed = GAME.input.throttle * this.maxSpeed;
                this.speed += (targetSpeed - this.speed) * 0.05; // Инерция двигателя

                // Вектор вперед
                const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                this.mesh.position.add(forward.multiplyScalar(this.speed));

                // Вращение пропеллера
                this.propeller.rotation.z += this.speed * 0.5 + 0.1;

                // Обновление частиц
                this.updateParticles();

                // Обновление HUD горизонта
                const deg = this.rotParams.z * (180/Math.PI);
                document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${-deg}deg)`;
                // Смещение линии по тангажу
                const pitchOffset = this.rotParams.x * 50;
                document.getElementById('horizon-line').style.top = `${50 + pitchOffset}%`;

                // Проверка коллизии с землей
                this.checkCollision();
            }

            checkCollision() {
                const terrainH = getTerrainHeight(this.mesh.position.x, this.mesh.position.z);
                if (this.mesh.position.y < terrainH + 2) {
                    gameOver("CRASHED INTO TERRAIN");
                }
            }
        }

        // --- ГЕНЕРАЦИЯ МИРА ---
        let terrainMesh;
        function createWorld() {
            // Земля
            const geometry = new THREE.PlaneGeometry(5000, 5000, 128, 128);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            const colors = [];
            const colorObj = new THREE.Color();

            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                const h = getTerrainHeight(x, z);
                pos.setY(i, h);

                // Окраска вершин (вертекс-шейдинг простой)
                if(h < 5) colorObj.setHex(0x228B22); // Трава
                else if (h < 60) colorObj.setHex(0x556B2F); // Темная трава
                else if (h < 120) colorObj.setHex(0x808080); // Камень
                else colorObj.setHex(0xFFFFFF); // Снег

                colors.push(colorObj.r, colorObj.g, colorObj.b);
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();

            // Материал с процедурной текстурой шума для детализации
            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                map: TextureGen.createNoiseTexture(512, 512, '#ffffff', '#000000'),
                roughness: 0.9
            });

            terrainMesh = new THREE.Mesh(geometry, material);
            terrainMesh.receiveShadow = true;
            GAME.scene.add(terrainMesh);

            // Небо (Skybox упрощенный - большая сфера)
            const skyGeo = new THREE.SphereGeometry(2000, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                color: 0x87CEEB,
                side: THREE.BackSide,
                fog: false
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            GAME.scene.add(sky);
        }

        // Функция высоты (Шум)
        function getTerrainHeight(x, z) {
            let y = GAME.simplex.noise2D(x * 0.002, z * 0.002) * 100; // Основа
            y += GAME.simplex.noise2D(x * 0.01, z * 0.01) * 20; // Детали
            if (y < 0) y = 0; // Вода (плоская)
            return y;
        }

        // --- СИСТЕМА КАМЕРЫ ---
        function updateCamera() {
            if (!GAME.airplane) return;

            // Камера следует за самолетом, но с задержкой (Lerp)
            const targetPos = new THREE.Vector3(0, 8, -20).applyMatrix4(GAME.airplane.mesh.matrixWorld);

            // Чем меньше число (0.05), тем плавнее и медленнее камера ("тяжелее")
            GAME.camera.position.lerp(targetPos, 0.1);

            // Камера смотрит чуть выше самолета
            const lookAtPos = GAME.airplane.mesh.position.clone().add(new THREE.Vector3(0, 0, 20).applyQuaternion(GAME.airplane.mesh.quaternion));
            GAME.camera.lookAt(lookAtPos);
        }

        // --- УПРАВЛЕНИЕ ---
        function initInput() {
            document.addEventListener('mousemove', (e) => {
                if(!GAME.active) return;
                // Нормализация -1..1
                GAME.input.x = (e.clientX / window.innerWidth) * 2 - 1;
                GAME.input.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') GAME.input.throttle = Math.min(GAME.input.throttle + 0.1, 1.0);
                if(e.code === 'KeyS') GAME.input.throttle = Math.max(GAME.input.throttle - 0.1, 0.0);
            });

            // Touch
            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(!GAME.active) return;
                const t = e.touches[0];
                GAME.input.x = (t.clientX / window.innerWidth) * 2 - 1;
                GAME.input.y = -(t.clientY / window.innerHeight) * 2 + 1;
            }, {passive: false});
        }

        // --- ОСНОВНОЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            if (!GAME.active) return;

            const dt = GAME.clock.getDelta();

            GAME.airplane.update(dt);
            updateCamera();

            // Обновление UI текстов
            document.getElementById('val-spd').innerText = Math.round(GAME.airplane.speed * 300);
            document.getElementById('val-alt').innerText = Math.round(GAME.airplane.mesh.position.y);
            document.getElementById('val-thr').innerText = Math.round(GAME.input.throttle * 100);
            document.getElementById('val-x').innerText = Math.round(GAME.airplane.mesh.position.x);
            document.getElementById('val-z').innerText = Math.round(GAME.airplane.mesh.position.z);

            GAME.renderer.render(GAME.scene, GAME.camera);
        }

        function init() {
            GAME.scene = new THREE.Scene();
            // Туман для реализма дальности
            GAME.scene.fog = new THREE.Fog(0x87CEEB, 100, 1500);

            GAME.camera = new THREE.PerspectiveCamera(60, GAME.width / GAME.height, 0.1, 5000);

            GAME.renderer = new THREE.WebGLRenderer({ antialias: true });
            GAME.renderer.setSize(GAME.width, GAME.height);
            GAME.renderer.shadowMap.enabled = true;
            GAME.renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Мягкие тени
            document.body.appendChild(GAME.renderer.domElement);

            // Свет
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            GAME.scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 200, 100);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 500;
            sun.shadow.camera.left = -200;
            sun.shadow.camera.right = 200;
            sun.shadow.camera.top = 200;
            sun.shadow.camera.bottom = -200;
            GAME.scene.add(sun);

            // Создание объектов
            createWorld();
            GAME.airplane = new Airplane();

            initInput();

            window.addEventListener('resize', () => {
                GAME.width = window.innerWidth;
                GAME.height = window.innerHeight;
                GAME.renderer.setSize(GAME.width, GAME.height);
                GAME.camera.aspect = GAME.width / GAME.height;
                GAME.camera.updateProjectionMatrix();
            });
        }

        // Старт игры
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay-screen').style.display = 'none';
            GAME.active = true;
            init();
            animate();
        });

        function gameOver(reason) {
            GAME.active = false;
            document.getElementById('overlay-screen').style.display = 'flex';
            document.getElementById('status-text').innerText = reason;
            document.getElementById('start-btn').innerText = "ПЕРЕЗАПУСК";
            document.getElementById('start-btn').onclick = () => location.reload();
        }

    </script>
</body>
</html>
